<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maya Private Assistant</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <h1>Maya Assistant</h1>
    <p class="sub">Siri-style voice UX for your private local/cloud BitNet API.</p>

    <section class="panel">
      <label>API Base URL</label>
      <input id="apiBase" value="http://127.0.0.1:8080" />

      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="BITNET_CLOUD_API_KEY" />
    </section>

    <section class="panel">
      <h2>Permission Settings</h2>
      <div class="checks">
        <label><input type="checkbox" id="perm_ai_chat"> AI chat</label>
        <label><input type="checkbox" id="perm_send_sms"> Send SMS</label>
        <label><input type="checkbox" id="perm_make_calls"> Make calls</label>
        <label><input type="checkbox" id="perm_manage_calendar"> Manage calendar</label>
        <label><input type="checkbox" id="perm_location_access"> Location access</label>
        <label><input type="checkbox" id="perm_run_when_phone_off"> Run tasks when phone is off (cloud mode)</label>
      </div>
      <div class="actions">
        <button id="loadPermsBtn">Load Permissions</button>
        <button id="savePermsBtn">Save Permissions</button>
      </div>
    </section>

    <section class="panel">
      <label>Prompt</label>
      <textarea id="prompt" rows="4" placeholder="Ask Maya..."></textarea>
      <div class="actions">
        <button id="speakBtn">🎙️ Speak</button>
        <button id="sendBtn">Send</button>
      </div>
    </section>

    <section class="panel">
      <h2>Queue a background task</h2>
      <input id="taskTitle" placeholder="Task title" />
      <textarea id="taskDetails" rows="2" placeholder="Task details"></textarea>
      <button id="queueTaskBtn">Queue Task</button>
    </section>

    <section class="panel">
      <h2>Assistant Response</h2>
      <pre id="output">(waiting)</pre>
    </section>

    <p class="note">System-level Siri privileges are not possible from a web app alone. This app provides configurable local/cloud permissions in your own stack.</p>
  </main>

  <script src="./app.js"></script>
</body>
</html>
