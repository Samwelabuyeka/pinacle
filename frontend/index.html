<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maya Private Assistant</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <h1>Maya Assistant</h1>
    <p class="sub">OVOS/HiveMind-style assistant shell with privacy guardrails.</p>

    <section class="panel">
      <label>API Base URL</label>
      <input id="apiBase" value="http://127.0.0.1:8080" />
      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="BITNET_CLOUD_API_KEY" />
    </section>

    <section class="panel">
      <h2>Permission Settings</h2>
      <div class="checks">
        <label><input type="checkbox" id="perm_ai_chat"> AI chat</label>
        <label><input type="checkbox" id="perm_send_sms"> Send SMS</label>
        <label><input type="checkbox" id="perm_make_calls"> Make calls</label>
        <label><input type="checkbox" id="perm_manage_calendar"> Manage calendar</label>
        <label><input type="checkbox" id="perm_location_access"> Location access</label>
        <label><input type="checkbox" id="perm_run_when_phone_off"> Run when phone off</label>
        <label><input type="checkbox" id="perm_device_search"> Device page/file search</label>
        <label><input type="checkbox" id="perm_always_mic"> Always mic</label>
        <label><input type="checkbox" id="perm_always_speaker"> Always speaker</label>
      </div>
      <div class="actions">
        <button id="loadPermsBtn">Load Permissions</button>
        <button id="savePermsBtn">Save Permissions</button>
      </div>
    </section>

    <section class="panel">
      <label>Prompt</label>
      <textarea id="prompt" rows="4" placeholder="Ask Maya..."></textarea>
      <div class="actions">
        <button id="speakBtn">🎙️ Speak</button>
        <button id="sendBtn">Send</button>
      </div>
    </section>

    <section class="panel">
      <h2>Device Search (privacy-guarded)</h2>
      <input id="searchBase" value="$HOME/Documents" />
      <input id="searchQuery" placeholder="file name fragment" />
      <button id="searchBtn">Search Device</button>
    </section>

    <section class="panel">
      <h2>Suggestions</h2>
      <button id="suggestionsBtn">Get Suggestions</button>
      <pre id="suggestions">(none)</pre>
    </section>

    <section class="panel">
      <h2>Assistant Response</h2>
      <pre id="output">(waiting)</pre>
    </section>

    <p class="note">Strong privacy defense is enabled via permission gates + filesystem allowlist for search.</p>
  </main>

  <script src="./app.js"></script>
</body>
</html>
